# ================================================================
# PostgreSQL producao (descomente SOMENTE quando o banco estiver rodando)
# Passo 1: crie o banco no pgAdmin: CREATE DATABASE carbontree_db;
# Passo 2: preencha a senha abaixo
# Passo 3: comente as linhas H2 acima e descomente as abaixo
# ================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/carbontree_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Luiz2001!
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ================================================================
# JPA / Hibernate
# ================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Evita warning "column USER is a reserved word" no H2
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ================================================================
# Thymeleaf
# ================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ================================================================
# Limites de conformidade (usados pelo AlertService)
# ================================================================
carbontree.co2.limit=1000
carbontree.pm.limit=150

# ================================================================
# MQTT
# ================================================================
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=carbontree-client
mqtt.topic=carbontree/sensors/#

# ================================================================
# Logging
# ================================================================
logging.level.com.carbontreesystem=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN