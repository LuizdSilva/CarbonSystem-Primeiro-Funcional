# ================================================================
#  CarbonTree System — application.properties
#  PostgreSQL + Spring Boot 3.4
# ================================================================

spring.application.name=CarbonTreeSystem

# ================================================================
# PostgreSQL
# ================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/carbontreedb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=Luiz2001!

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ================================================================
# JPA / Hibernate
# ================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ================================================================
# Thymeleaf
# ================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ================================================================
# Limites de conformidade (usados pelo AlertService)
# ================================================================
carbontree.co2.limit=1000
carbontree.pm.limit=150

# ================================================================
# MQTT
# ================================================================
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=carbontree-client
mqtt.topic=carbontree/sensors/#

# ================================================================
# Logging
# ================================================================
logging.level.com.carbontreesystem=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.root=WARN