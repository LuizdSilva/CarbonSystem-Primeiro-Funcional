<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content}, ~{::scriptsExtra})}">
<head><title>Calculadora IPCC/LMDI</title></head>
<body>

<th:block th:fragment="content">

    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;
                min-height: 60vh; text-align: center; gap: 1.5rem;">

        <div style="font-size: 4rem;">🏗️</div>

        <div>
            <h2 style="font-size: 1.6rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;">
                Em Fase de Criação e Validação
            </h2>
            <p style="color: var(--text-muted); font-size: 1rem; max-width: 480px; line-height: 1.6;">
                A Calculadora IPCC/LMDI está sendo desenvolvida e validada cientificamente.
                Em breve estará disponível nesta área.
            </p>
        </div>

        <a th:href="@{/dashboard}"
           style="display: inline-flex; align-items: center; gap: 0.5rem;
                  background: var(--accent-green); color: #fff; border: none;
                  border-radius: 8px; padding: 0.6rem 1.4rem;
                  font-size: 0.9rem; font-weight: 600; text-decoration: none;">
            ← Voltar ao Dashboard
        </a>

    </div>

</th:block>

<th:block th:fragment="scriptsExtra"></th:block>

</body>
</html>
