spring.datasource.url=jdbc:postgresql://localhost:5432/carbontree_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=user
spring.datasource.password=Luiz2001!

# Connection pool (HikariCP — padrão do Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ─── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate checa se o schema bate com as entidades (seguro em prod)
# Rode o schema.sql manualmente antes do primeiro deploy!
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Melhora performance em lote (opcional)
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ─── H2 Console DESABILITADO em prod ───────────────────────
spring.h2.console.enabled=false

# ─── Thymeleaf ─────────────────────────────────────────────
spring.thymeleaf.cache=true

# ─── MQTT ──────────────────────────────────────────────────
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=carbontree-prod
mqtt.topic=carbontree/sensors/#

# ─── Logging ───────────────────────────────────────────────
logging.level.com.carbontreesystem=INFO
logging.level.org.springframework.security=WARN
logging.level.root=WARN