<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarbonTree System</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #16a34a; --primary-dark: #15803d; --bg: #0d1f14; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #111f17; border: 1px solid #1e3027;
            padding: 40px; border-radius: 20px;
            width: 340px; text-align: center;
        }
        .brand { font-size: 1.5rem; font-weight: 700; color: #e2f0e8; margin-bottom: 6px; }
        .brand span { color: #4ade80; }
        .sub { font-size: 0.8rem; color: #4d7a5e; margin-bottom: 28px; }
        input {
            width: 100%; padding: 11px 14px; margin: 6px 0;
            background: #162318; border: 1px solid #243c2d;
            border-radius: 8px; color: #e2f0e8; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        button {
            width: 100%; padding: 12px; margin-top: 14px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        .msg-error   { color: #f87171; font-size: 0.82rem; margin-top: 12px; }
        .msg-success { color: #4ade80; font-size: 0.82rem; margin-top: 12px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="brand">🌳 Carbon<span>Tree</span></div>
    <div class="sub">Sistema de Monitoramento Ambiental</div>

    <!-- Formulário Spring Security -->
    <form th:action="@{/login}" method="post">
        <input type="text"     name="username" placeholder="Usuário"  required autofocus/>
        <input type="password" name="password" placeholder="Senha"    required/>
        <button type="submit">Entrar</button>
    </form>

    <p class="msg-error"   th:if="${param.error}">Usuário ou senha incorretos.</p>
    <p class="msg-success" th:if="${param.logout}">Sessão encerrada com sucesso.</p>
    <p class="msg-error"   th:if="${param.expired}">Sessão expirada. Faça login novamente.</p>
</div>
</body>
</html>
